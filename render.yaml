services:
  # Backend Web Service (Node/Express with Socket.io)
  - type: web
    name: trading-app-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://trading-app-frontend.onrender.com # Replace with your actual frontend URL once deployed
      - key: MONGODB_URI
        sync: false # You will provide your MongoDB Atlas connection string in the Render Dashboard

  # Frontend Static Site (Vite/React)
  - type: web
    name: trading-app-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    routes:
      # SPA rewrite rule to prevent 404 errors on browser refresh
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://trading-app-backend.onrender.com # Replace with your actual backend URL once deployed
